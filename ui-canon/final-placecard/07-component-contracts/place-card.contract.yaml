version: 2
component: PlaceCard
accepts_axes:
  density:
    values: [compact, cozy, relaxed]
    default: cozy
  surface:
    values: [default, elevated]
    default: default
  header_body_gap:
    values: [compact, cozy, relaxed]
    default: cozy
constraints:
  - if:
      density: relaxed
    then:
      header_body_gap: relaxed
render_contract:
  required_slots:
    - header
    - body
  forbidden_mutations:
    - reorder_slots
    - remove_required_slot
naming_map:
  canonical_axis: place_card.header_body_gap
  contract_axis: header_body_gap
  token_axis: component.placeCard.headerBodyGap
  projection_attr: data-header-body-gap
