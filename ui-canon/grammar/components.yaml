version: 2
naming_system:
  canonical: snake_case
  tokens_and_js: camelCase
  projection_attributes: kebab-case
  mappings:
    - canonical: place_card.header_body_gap
      grammar_axis: header_body_gap
      token_axis: component.placeCard.headerBodyGap
      projection_attribute: data-header-body-gap
components:
  PlaceCard:
    accepts_axes:
      - density
      - surface
      - header_body_gap
    defaults:
      density: cozy
      surface: default
      header_body_gap: cozy
    rules:
      - when:
          density: relaxed
        enforce:
          header_body_gap: relaxed
      - when:
          surface: elevated
        allow:
          shadow: card
  ApprovalCard:
    accepts_axes:
      - risk_posture
      - prominence
      - decision_state
